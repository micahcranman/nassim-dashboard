name: Build Dashboard

on:
  schedule:
    # Every 30 minutes — keeps the data-age badge fresh; client-side tiles refresh between.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this on-demand run?'
        required: false
        default: 'manual'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright chromium (TBL liquidity fetcher)
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: pytest tests/ -q

      - name: Run dashboard build
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BGEO_TOKEN: ${{ secrets.BGEO_TOKEN }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          BMP_API_KEY: ${{ secrets.BMP_API_KEY }}
          TBL_EMAIL: ${{ secrets.TBL_EMAIL }}
          TBL_PASSWORD: ${{ secrets.TBL_PASSWORD }}
        run: python dashboard.py

      - name: Publish outputs to docs/
        run: |
          mkdir -p docs
          cp -f outputs/latest.json docs/latest.json
          cp -f outputs/history.csv docs/history.csv 2>/dev/null || true
          # signals.json is regenerated only on strategy re-lock (committed); keep whatever is there.

      - name: Commit & push artifacts
        run: |
          git config user.name "nassim-bot"
          git config user.email "nassim-bot@users.noreply.github.com"
          # Persist last-good + caches so a source outage on a fresh runner shows yesterday's
          # number (flagged stale) instead of a blank.
          git add docs/latest.json docs/history.csv docs/signals.json \
                  outputs/latest.json outputs/history.csv \
                  outputs/lastgood outputs/cache 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
