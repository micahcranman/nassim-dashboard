name: Build Dashboard

on:
  schedule:
    # Monday 12:30 UTC = 7:30 AM CT (during CDT)
    - cron: '30 12 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this on-demand run?'
        required: false
        default: 'manual'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard build
        run: python dashboard.py

      - name: Move outputs to docs/
        run: |
          mkdir -p docs
          cp -f outputs/latest.png docs/latest.png
          cp -f outputs/latest.json docs/latest.json
          cp -f outputs/history.csv docs/history.csv
          # Copy archived PNGs into docs/
          if [ -d outputs/archive ]; then
            cp -f outputs/archive/*.png docs/ 2>/dev/null || true
          fi
          # Generate archive.json
          python -c "import os, json; files = sorted([f for f in os.listdir('docs') if f.endswith('.png') and f != 'latest.png']); open('docs/archive.json','w').write(json.dumps(files))"

      - name: Commit & push artifacts
        run: |
          git config user.name "nassim-bot"
          git config user.email "nassim-bot@users.noreply.github.com"
          git add docs/ outputs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
